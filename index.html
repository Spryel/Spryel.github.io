<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>To Athanasia <3</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* 🎂 BACKGROUND */
body {
  background: radial-gradient(circle at top, #ff9a9e, #fad0c4, #ffd1dc);
}

/* ⭐ STARS */
.star {
  position: absolute;
  color: gold;
  font-size: 18px;
  animation: floatStar 6s infinite ease-in-out;
}

@keyframes floatStar {
  0% { transform: translateY(0); opacity: 0.6; }
  50% { transform: translateY(-40px); opacity: 1; }
  100% { transform: translateY(0); opacity: 0.6; }
}

/* 🎈 BALLOONS */
.balloon {
  position: absolute;
  width: 30px;
  height: 40px;
  background: #ff4d6d;
  border-radius: 50%;
  animation: floatBalloon 12s linear infinite;
}

@keyframes floatBalloon {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-120vh); }
}

/* 🦖 🐔 FLOATING EMOJIS */
.float-emoji {
  position: absolute;
  font-size: 40px;
  animation: floatEmoji 10s infinite ease-in-out;
}

@keyframes floatEmoji {
  0% { transform: translate(0,0); }
  50% { transform: translate(60px,-80px); }
  100% { transform: translate(0,0); }
}

/* 🖼 IMAGES */
.floating-img {
  position: absolute;
  width: 120px;
  animation: floatFancy 8s infinite ease-in-out;
}

@keyframes floatFancy {
  0% { transform: translate(0,0); }
  50% { transform: translate(60px,-60px); }
  100% { transform: translate(0,0); }
}

/* 💌 ENVELOPES */
.bg-container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
  height: 100vh;
}

.envelope-box {
  text-align: center;
  cursor: pointer;
}

.envelope {
  width: 110px;
  height: 75px;
  background: #ff4d6d;
  position: relative;
  border-radius: 5px;
}

.flap {
  position: absolute;
  width: 110px;
  height: 60px;
  background: #ff758c;
  top: -60px;
  clip-path: polygon(0 100%, 50% 0, 100% 100%);
  transform: rotateX(180deg);
  transform-origin: bottom;
  transition: 0.6s;
}

.envelope.open .flap {
  transform: rotateX(0deg);
}

.name {
  color: white;
  margin-top: 10px;
}

/* 💌 LETTER */
.letter-box {
  display: none;
  position: fixed;
  background: white;
  padding: 25px;
  border-radius: 20px;
  max-width: 400px;
  left: 50%;
  top: 50%;
  transform: translate(-50%,-50%);
  z-index: 10;
}

/* 🎆 FIREWORKS */
.firework {
  position: fixed;
  width: 10px;
  height: 10px;
  background: red;
  border-radius: 50%;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  0% { transform: scale(1); opacity:1; }
  100% { transform: scale(10); opacity:0; }
}

/* 🎊 CONFETTI */
.confetti {
  position: fixed;
  width: 6px;
  height: 10px;
  background: yellow;
  top: -10px;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  to { transform: translateY(100vh) rotate(360deg); }
}

</style>
</head>

<body>

<!-- 🖼 YOUR IMAGES -->
<img src="0cc9a18c-3564-4249-b81b-dcfb6bcf6de5.jfif" class="floating-img" style="top:10%;left:20%">
<img src="3bc884cb-4f7d-415f-80c8-c155f1be844d.jfif" class="floating-img" style="top:60%;left:70%">

<!-- ⭐ STARS -->
<div class="star" style="top:10%;left:10%">⭐</div>
<div class="star" style="top:40%;left:80%">⭐</div>
<div class="star" style="top:70%;left:30%">⭐</div>

<!-- 🦖 🐔 -->
<div class="float-emoji" style="top:20%;left:70%">🦖</div>
<div class="float-emoji" style="top:60%;left:20%">🐔</div>

<!-- 🎈 -->
<div class="balloon" style="left:10%"></div>
<div class="balloon" style="left:50%"></div>

<div class="bg-container">

<div class="envelope-box" onclick="openEnvelope(1)">
<div class="envelope" id="env1"><div class="flap"></div></div>
<div class="name">Yumi</div></div>

<div class="envelope-box" onclick="openEnvelope(2)">
<div class="envelope" id="env2"><div class="flap"></div></div>
<div class="name">Jewold</div></div>

<div class="envelope-box" onclick="openEnvelope(3)">
<div class="envelope" id="env3"><div class="flap"></div></div>
<div class="name">LongLong</div></div>

<div class="envelope-box" onclick="openEnvelope(4)">
<div class="envelope" id="env4"><div class="flap"></div></div>
<div class="name">Jhonpaul</div></div>

<div class="envelope-box" onclick="openEnvelope(5)">
<div class="envelope" id="env5"><div class="flap"></div></div>
<div class="name">RenRen</div></div>

<div class="envelope-box" onclick="openEnvelope(6)">
<div class="envelope" id="env6"><div class="flap"></div></div>
<div class="name">JanJan</div></div>

</div>

<!-- LETTER SAMPLE -->
<div id="letter1" class="letter-box">
<h2>From Yumi 💗</h2>
<p>Happy birthday 💗</p>
<button onclick="closeLetter()">Close</button>
</div>

<script>
function openEnvelope(num){

let pass = prompt("Enter password:");
if(pass !== "4/16/2026"){
  alert("Wrong password 💔");
  return;
}

document.getElementById("env"+num).classList.add("open");
document.getElementById("letter"+num).style.display="block";

fireworks();
confetti();
}

function closeLetter(){
document.querySelectorAll(".letter-box").forEach(l=>l.style.display="none");
}

/* 🎆 FIREWORKS */
function fireworks(){
for(let i=0;i<10;i++){
let f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*100+"vh";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}
}

/* 🎊 CONFETTI */
function confetti(){
for(let i=0;i<40;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}
</script>

</body>
</html>
